# This is a basic workflow to help you get started with Actions

name: DEP_CI

# Controls when the workflow will run
on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

  workflow_dispatch:

jobs:
  # This workflow contains a single job called "build"
  build:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest

    permissions:
      contents: read

    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@fa2e9d605c4eeb9fcad4c99c224cee0c6c7f3594
        with:
          egress-policy: block
          allowed-endpoints: |
            github.com:443
            api.github.com:443
            objects.githubusercontent.com:443
            objects-origin.githubusercontent.com:443
            uploads.github.com:443
            github-releases.githubusercontent.com:443
            pkg-containers.githubusercontent.com:443
            hosted-compute-watchdog-prod-iad-01.githubapp.com:443
            repo.maven.apache.org:443
            repo1.maven.org:443
            api.adoptium.net:443
            deb.debian.org:443
            security.ubuntu.com:443
            archive.ubuntu.com:443
            
      # Runs a single command using the runners shell
      - name: Run a one-line script
        run: echo security runnner complete
        
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      # Runs a build command
      - name: Download dependencies only
        run: mvn dependency:go-offline
